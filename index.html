<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Situs Sedang Tidak Tersedia</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0c0c0c;
  color:#fff;
  overflow:hidden;
  position:relative;
}
canvas { 
  position:absolute; top:0; left:0; width:100%; height:100%; z-index:0;
}
.container {
  position: relative;
  z-index:1;
  width:90%;
  max-width:400px;
  background:#111;
  border-radius:16px;
  padding:3rem 2rem;
  text-align:center;
  box-shadow:0 12px 40px rgba(0,0,0,0.7);
  border-top: 4px solid #ff5722;
  animation: fadeIn 0.8s ease forwards;
}
@keyframes fadeIn { from {opacity:0; transform:translateY(-20px);} to {opacity:1; transform:translateY(0);} }

.icon-lock {
  width:60px;
  height:60px;
  margin:0 auto 1rem;
  border:2px solid #ff5722;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}
.icon-lock:before {
  content:"\1F512";
  font-size:28px;
  color:#ff5722;
}
h1 { font-size:2rem; margin-bottom:1rem; font-weight:600; }
p { font-size:1rem; color:#ccc; margin-bottom:2rem; line-height:1.4; }
button {
  padding:1rem 2rem;
  font-size:1rem;
  border:none;
  border-radius:10px;
  background:#ff5722;
  color:#fff;
  cursor:pointer;
  box-shadow:0 5px 20px rgba(255,87,34,0.5);
  transition: all 0.3s ease;
}
button:hover { transform: translateY(-3px); background:#e64a19; box-shadow:0 8px 25px rgba(255,87,34,0.7); }
button:disabled { background:#555; cursor:not-allowed; box-shadow:none; }

.info-box {
  margin-top:1.5rem;
  padding:1rem;
  background:#1a1a1a;
  border-radius:10px;
  font-size:0.9rem;
  color:#aaa;
  display:flex;
  align-items:center;
  gap:0.5rem;
}
.info-box:before { content:"\2139"; font-size:1.1rem; color:#aaa; }

@media(max-width:480px){
  .container { padding:2rem 1.5rem; }
  h1 { font-size:1.5rem; }
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="container">
  <div class="icon-lock"></div>
  <h1>Akses Situs Sementara Tidak Tersedia</h1>
  <p>Saat ini situs ini tidak tersedia dan tidak dapat diakses. Silakan coba kembali nanti.</p>
  <button id="retryBtn">Coba Lagi</button>
  <div class="info-box">
    Akses saat ini sedang dinonaktifkan. Silakan hubungi administrator jika ini berlanjut.
  </div>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random()*W;
    this.y = Math.random()*H;
    this.r = Math.random()*2 + 0.5;
    this.dx = (Math.random()-0.5)*0.4;
    this.dy = (Math.random()-0.5)*0.4;
    this.alpha = Math.random()*0.25 + 0.05;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
    ctx.fill();
    this.x += this.dx;
    this.y += this.dy;
    if(this.x<0||this.x>W) this.dx*=-1;
    if(this.y<0||this.y>H) this.dy*=-1;
  }
}

let particles = [];
for(let i=0;i<80;i++) particles.push(new Particle());

let mouse = {x: W/2, y: H/2};
window.addEventListener('mousemove', e => { mouse.x=e.clientX; mouse.y=e.clientY; });

function drawLines() {
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      let p1=particles[i], p2=particles[j];
      let dx=p1.x-p2.x, dy=p1.y-p2.y;
      let dist=Math.sqrt(dx*dx + dy*dy);
      if(dist<80){
        ctx.beginPath();
        ctx.moveTo(p1.x,p1.y);
        ctx.lineTo(p2.x,p2.y);
        let alpha = 0.2*(1-dist/80);
        ctx.strokeStyle=`rgba(255,87,34,${alpha})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  }
}

function animate(){
  ctx.clearRect(0,0,W,H);
  for(let p of particles){
    let dx = p.x - mouse.x;
    let dy = p.y - mouse.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if(dist<80){
      let angle = Math.atan2(dy,dx);
      p.x += Math.cos(angle)*0.4;
      p.y += Math.sin(angle)*0.4;
    }
    p.draw();
  }
  drawLines();
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize',()=>{
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
});

// Retry button countdown
const retryBtn = document.getElementById('retryBtn');
let cooldown = false;
retryBtn.addEventListener('click', ()=>{
  if(cooldown) return;
  cooldown = true;
  retryBtn.disabled = true;
  let seconds=5;
  const originalText = retryBtn.innerText;
  retryBtn.innerText = `${originalText} (${seconds})`;
  const interval = setInterval(()=>{
    seconds--;
    retryBtn.innerText = `${originalText} (${seconds})`;
    if(seconds<=0){
      clearInterval(interval);
      retryBtn.innerText = originalText;
      retryBtn.disabled=false;
      cooldown=false;
      window.location.reload();
    }
  },1000);
});
</script>
</body>
</html>
