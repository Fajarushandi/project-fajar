<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akses Tidak Tersedia</title>

<!-- Non-blocking font load: preconnect + link instead of @import -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap"></noscript>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #080810;
    --surface:   #0f0f1a;
    --border:    rgba(255,255,255,0.07);
    --accent:    #e05c2a;
    --accent2:   #9b4de0;
    --text:      #e8e8f0;
    --muted:     #9999ad;       /* was #6b6b80 — bumped for contrast */
    --footer:    rgba(255,255,255,0.42); /* was 0.15 — fails WCAG, now passes AA on dark bg */
    --glow-a:    rgba(224, 92, 42, 0.35);
    --glow-b:    rgba(155, 77, 224, 0.25);
  }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Background canvas ── */
  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Ambient orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 420px; height: 420px;
    top: -120px; left: -100px;
    background: var(--glow-a);
    animation-duration: 14s;
  }
  .orb-2 {
    width: 380px; height: 380px;
    bottom: -100px; right: -80px;
    background: var(--glow-b);
    animation-duration: 18s;
    animation-delay: -6s;
  }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 1;
    width: min(440px, 92vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 3rem 2.5rem 2.5rem;
    text-align: center;
    background-image:
      linear-gradient(
        160deg,
        rgba(255,255,255,0.04) 0%,
        transparent 50%
      );
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 32px 80px rgba(0,0,0,0.6),
      0 0 60px var(--glow-a);
    animation: fadeUp 0.7s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(28px) scale(0.97); }
    to   { opacity:1; transform: translateY(0)    scale(1);    }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    border-radius: 1px;
  }

  /* ── Icon ── */
  .icon-wrap {
    width: 72px; height: 72px;
    margin: 0 auto 1.75rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 40% 35%, rgba(224,92,42,0.18), rgba(155,77,224,0.10));
    border: 1px solid rgba(224,92,42,0.35);
    box-shadow: 0 0 28px var(--glow-a), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
    animation: pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 20px var(--glow-a), inset 0 1px 0 rgba(255,255,255,0.06); }
    50%       { box-shadow: 0 0 40px var(--glow-a), 0 0 70px rgba(224,92,42,0.15), inset 0 1px 0 rgba(255,255,255,0.06); }
  }

  .icon-wrap svg {
    width: 30px; height: 30px;
    stroke: var(--accent);
    stroke-width: 1.8;
    fill: none;
    filter: drop-shadow(0 0 6px var(--accent));
  }

  /* ── Status pill ── */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(224,92,42,0.1);
    border: 1px solid rgba(224,92,42,0.25);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  /* ── Headings ── */
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.65rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.85rem;
    background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.55));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  p {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.65;
    max-width: 320px;
    margin-inline: auto;
    margin-bottom: 2rem;
  }

  /* ── ETA row ── */
  .eta-row {
    font-size: 0.82rem;
    color: var(--text);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.9rem;
    margin-bottom: 1.25rem;
    display: none; /* shown via JS only if an ETA is configured */
  }
  .eta-row strong { color: var(--accent); font-weight: 600; }

  /* ── Button ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0.85rem 2rem;
    font-size: 0.9rem;
    font-weight: 500;
    font-family: inherit;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #c94e22);
    color: #fff;
    cursor: pointer;
    letter-spacing: 0.01em;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(224,92,42,0.4);
    width: 100%;
    justify-content: center;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(224,92,42,0.55);
  }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { cursor: default; opacity: 0.85; }
  .btn:focus-visible {
    outline: 2px solid var(--accent2);
    outline-offset: 3px;
  }

  .btn svg {
    width: 16px; height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    flex-shrink: 0;
  }

  /* ── Auto-retry note ── */
  .auto-retry-note {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.75rem;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.75rem 0;
  }

  /* ── Info row ── */
  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    text-align: left;
  }
  .info-row svg {
    width: 16px; height: 16px;
    stroke: var(--muted);
    fill: none;
    stroke-width: 2;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .info-row span {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.55;
  }
  .info-row span strong {
    color: rgba(255,255,255,0.75);
    font-weight: 500;
  }
  .info-row a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: rgba(224,92,42,0.4);
  }
  .info-row a:hover { text-decoration-color: var(--accent); }

  /* ── Footer note ── */
  .footer-note {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--footer);
    letter-spacing: 0.02em;
  }

  /* ── Visually-hidden live region for screen readers ── */
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
  }

  @media (prefers-reduced-motion: reduce) {
    .orb, .card, .icon-wrap, .status-dot { animation: none; }
  }
</style>
</head>
<body>

<!-- Particle canvas (decorative only) -->
<canvas id="bg" aria-hidden="true"></canvas>

<!-- Ambient orbs (decorative only) -->
<div class="orb orb-1" aria-hidden="true"></div>
<div class="orb orb-2" aria-hidden="true"></div>

<!-- Card -->
<main class="card" role="main">

  <div class="icon-wrap" aria-hidden="true">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <div class="status-pill">
    <span class="status-dot" aria-hidden="true"></span>
    Akses Dinonaktifkan
  </div>

  <h1>Situs Sementara<br>Tidak Dapat Diakses</h1>
  <p>Halaman ini sedang dalam pemeliharaan atau aksesnya sedang dibatasi. Coba kembali beberapa saat lagi.</p>

  <!-- Filled by JS only if window.SITE_DOWNTIME_CONFIG.etaText is set -->
  <div class="eta-row" id="etaRow"></div>

  <button class="btn" id="retryBtn" type="button">
    <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    <span id="retryBtnLabel">Coba Lagi</span>
  </button>

  <div class="divider"></div>

  <p class="footer-note">ERR_ACCESS_RESTRICTED · <span id="ts"></span></p>

  <!-- Screen-reader-only live status for retry attempts -->
  <p class="sr-only" id="srStatus" role="status" aria-live="polite"></p>
</main>

<script>
(function () {
  'use strict';

  /* ──────────────────────────────────────────────────────────
     CONFIG — edit these to fit your deployment.
     healthCheckUrl: an endpoint that resolves (any HTTP status
       reachable, even 503) when the real site is back. If you
       don't have one, leave null and the button will fall back
       to a plain reload after a short delay.
     etaText: optional human-readable ETA, e.g. "sekitar 30 menit".
       Leave null to hide the ETA row entirely.
  ────────────────────────────────────────────────────────────── */
  const CONFIG = {
    healthCheckUrl: null,          // e.g. "/api/health"
    etaText: null                  // e.g. "sekitar 30 menit"
  };

  /* ── Timestamp (label clarifies this is local load time, not a server log) ── */
  const ts = document.getElementById('ts');
  ts.textContent = 'Dicek pada ' + new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });

  /* ── ETA row ── */
  const etaRow = document.getElementById('etaRow');
  if (CONFIG.etaText) {
    etaRow.style.display = 'block';
    etaRow.innerHTML = 'Estimasi pulih: <strong>' + CONFIG.etaText + '</strong>';
  }

  /* ── Retry logic with real health-check ── */
  const retryBtn = document.getElementById('retryBtn');
  const retryBtnLabel = document.getElementById('retryBtnLabel');
  const srStatus = document.getElementById('srStatus');

  function setSrStatus(msg) { srStatus.textContent = msg; }

  async function checkHealth() {
    if (!CONFIG.healthCheckUrl) return true; // no endpoint configured — assume a reload is the best we can do
    try {
      const res = await fetch(CONFIG.healthCheckUrl, { method: 'GET', cache: 'no-store' });
      return res.ok;
    } catch (e) {
      return false;
    }
  }

  async function attemptRetry() {
    retryBtn.disabled = true;
    retryBtnLabel.textContent = 'Memeriksa…';
    retryBtn.querySelector('svg').style.animation = 'spin .7s linear infinite';
    setSrStatus('Memeriksa status situs…');

    const ok = await checkHealth();

    if (ok) {
      setSrStatus('Situs tersedia, memuat ulang…');
      window.location.reload();
      return;
    }

    retryBtn.disabled = false;
    retryBtnLabel.textContent = 'Coba Lagi';
    retryBtn.querySelector('svg').style.animation = '';
    setSrStatus('Situs masih belum dapat diakses.');
  }

  retryBtn.addEventListener('click', () => attemptRetry());

  /* ── Particle system (decorative, paused when tab hidden, cleans up on unload) ── */
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  let rafId = null;
  let running = false;
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    for (const p of particles) {
      p.x = Math.min(p.x, W);
      p.y = Math.min(p.y, H);
    }
  }

  function initParticles() {
    particles = [];
    if (reduceMotion) return;
    const count = Math.min(100, Math.floor((W * H) / 14000));
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.3,
        dx: (Math.random() - 0.5) * 0.25,
        dy: (Math.random() - 0.5) * 0.25,
        alpha: Math.random() * 0.18 + 0.03,
        hue: Math.random() < 0.15 ? 20 : 0
      });
    }
  }

  function draw() {
    if (!running) return;
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.hue
        ? `rgba(255,${140 + p.hue},80,${p.alpha})`
        : `rgba(255,255,255,${p.alpha})`;
      ctx.fill();
      p.x += p.dx;
      p.y += p.dy;
      if (p.x < 0 || p.x > W) p.dx *= -1;
      if (p.y < 0 || p.y > H) p.dy *= -1;
    }
    rafId = requestAnimationFrame(draw);
  }

  function startLoop() {
    if (running || reduceMotion) return;
    running = true;
    rafId = requestAnimationFrame(draw);
  }

  function stopLoop() {
    running = false;
    if (rafId !== null) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }
  }

  function handleVisibility() {
    if (document.hidden) stopLoop();
    else startLoop();
  }

  let resizeTimer = null;
  function onResize() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { resize(); initParticles(); }, 150);
  }

  if (!reduceMotion) {
    resize();
    initParticles();
    startLoop();
  }

  window.addEventListener('resize', onResize);
  document.addEventListener('visibilitychange', handleVisibility);
  window.addEventListener('beforeunload', () => {
    stopLoop();
    clearTimeout(resizeTimer);
    window.removeEventListener('resize', onResize);
    document.removeEventListener('visibilitychange', handleVisibility);
  });

  /* ── Spin keyframe for reload icon ── */
  const spinStyle = document.createElement('style');
  spinStyle.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
  document.head.appendChild(spinStyle);
})();
</script>
</body>
</html>
