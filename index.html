<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fajar Apps</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#111,#333);
      color:white;
      display:flex;
      justify-content:center;
      padding:30px 16px;
    }
    .wrap{
      width:100%;
      max-width:480px;
      text-align:center;
    }
    h1{margin-bottom:8px}
    p{opacity:.75;margin-bottom:28px}
    a{
      display:block;
      background:#000;
      color:white;
      text-decoration:none;
      padding:20px;
      border-radius:16px;
      margin:14px 0;
      font-size:18px;
      font-weight:bold;
      box-shadow:0 8px 20px rgba(0,0,0,.35);
    }
    a:active{transform:scale(.98)}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>FAJAR TOOLS</h1>
    <p>Kumpulan aplikasi</p>

    <a href="https://mmorpg-theta-plum.vercel.app/">MMORPG Tools</a>
    <a href="https://absensi-weld.vercel.app/">Absensi Kerja</a>
    <a href="https://lc-calculator.vercel.app/">LC Calculator</a>
  </div>
</body>
</html>
